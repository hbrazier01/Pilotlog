services:
  pilotlog-read-api:
    image: node:20-alpine
    container_name: pilotlog-read-api
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8788:8788"
    environment:
      PORT: "8788"
      PILOTLOG_HOME: "/app/data"
      PILOTLOG_DIR: "/app/data"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    command: sh -lc "cd /app && npm install --omit=dev && node pilotlog-cli/src/readApi.mjs"
    restart: unless-stopped
